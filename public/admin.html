<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lane Defense — Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      color: #ccd6f6;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #64ffda;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    #meta {
      color: #8892b0;
      font-size: 12px;
      margin-bottom: 24px;
    }
    #loading {
      color: #64ffda;
      font-size: 18px;
      padding: 40px 0;
    }
    #error {
      color: #ff6b6b;
      padding: 20px 0;
      display: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }
    .card {
      background: #131326;
      border: 1px solid #1e2a4a;
      border-radius: 10px;
      padding: 18px;
    }
    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8892b0;
      margin-bottom: 14px;
    }
    .card.wide {
      grid-column: 1 / -1;
    }
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat {
      background: #131326;
      border: 1px solid #1e2a4a;
      border-radius: 8px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .stat-label {
      font-size: 11px;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #64ffda;
      margin-top: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      color: #8892b0;
      font-weight: 600;
      padding: 6px 8px;
      border-bottom: 1px solid #1e2a4a;
    }
    td {
      padding: 6px 8px;
      border-bottom: 1px solid #0f1428;
    }
    tr:last-child td { border-bottom: none; }
    .fail-bar {
      display: inline-block;
      height: 8px;
      background: #e24b4a;
      border-radius: 4px;
      vertical-align: middle;
      margin-right: 6px;
    }
    canvas { max-width: 100%; }
  </style>
</head>
<body>
  <h1>Lane Defense — Analytics</h1>
  <div id="meta">Loading data…</div>
  <div id="loading">Fetching…</div>
  <div id="error"></div>
  <div id="dashboard" style="display:none">
    <div class="stat-row" id="kpi-row"></div>
    <div class="grid" id="chart-grid"></div>
  </div>

<script>
const DB = 'https://lanedefense-analytics-default-rtdb.firebaseio.com';

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
  return r.json();
}

function objValues(o) { return o && typeof o === 'object' ? Object.values(o) : []; }

// ── Chart helpers ──────────────────────────────────────────────────────────────

const PALETTE = [
  '#e24b4a','#378add','#639922','#ef9f27','#7f77dd','#d85a30',
  '#64ffda','#ccd6f6','#ff6b6b','#ffd700',
];

function makeBarChart(canvasId, labels, datasets, opts = {}) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#8892b0', font: { size: 11 } } },
        tooltip: { backgroundColor: '#0d0d1a', borderColor: '#1e2a4a', borderWidth: 1 },
      },
      scales: {
        x: { ticks: { color: '#8892b0', font: { size: 10 } }, grid: { color: '#1e2a4a' } },
        y: { ticks: { color: '#8892b0', font: { size: 10 } }, grid: { color: '#1e2a4a' }, ...opts.y },
      },
    },
  });
}

function makeLineChart(canvasId, labels, datasets) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#8892b0', font: { size: 11 } } },
        tooltip: { backgroundColor: '#0d0d1a', borderColor: '#1e2a4a', borderWidth: 1 },
      },
      scales: {
        x: { ticks: { color: '#8892b0', font: { size: 10 }, maxTicksLimit: 14 }, grid: { color: '#1e2a4a' } },
        y: { ticks: { color: '#8892b0', font: { size: 10 } }, grid: { color: '#1e2a4a' } },
      },
    },
  });
}

function makeDoughnutChart(canvasId, labels, data) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: PALETTE.slice(0, data.length), borderWidth: 0 }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#8892b0', font: { size: 11 } } },
        tooltip: { backgroundColor: '#0d0d1a', borderColor: '#1e2a4a', borderWidth: 1 },
      },
    },
  });
}

// ── Card builder ───────────────────────────────────────────────────────────────

function addCard(title, canvasId, wide = false) {
  const grid = document.getElementById('chart-grid');
  const card = document.createElement('div');
  card.className = 'card' + (wide ? ' wide' : '');
  card.innerHTML = `<h2>${title}</h2><canvas id="${canvasId}"></canvas>`;
  grid.appendChild(card);
}

function addTableCard(title, html, wide = false) {
  const grid = document.getElementById('chart-grid');
  const card = document.createElement('div');
  card.className = 'card' + (wide ? ' wide' : '');
  card.innerHTML = `<h2>${title}</h2>${html}`;
  grid.appendChild(card);
}

// ── Main ───────────────────────────────────────────────────────────────────────

async function main() {
  try {
    const [sessions, events] = await Promise.all([
      fetchJSON(`${DB}/sessions.json`),
      fetchJSON(`${DB}/events.json`),
    ]);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const sessionList = objValues(sessions);
    const eventList   = objValues(events);

    // ── KPI stats ────────────────────────────────────────────────────────────

    const playerIds = new Set(sessionList.map(s => s.playerId).filter(Boolean));
    const wins      = sessionList.filter(s => s.outcome === 'win').length;
    const losses    = sessionList.filter(s => s.outcome === 'loss').length;
    const total     = wins + losses;
    const winRate   = total > 0 ? ((wins / total) * 100).toFixed(1) : '–';

    const rescueUsed  = sessionList.filter(s => s.rescueUsed).length;
    const rescueRate  = total > 0 ? ((rescueUsed / total) * 100).toFixed(1) : '–';

    const correctD = eventList.filter(e => e.type === 'deploy' && e.correct).length;
    const wrongD   = eventList.filter(e => e.type === 'deploy' && !e.correct).length;
    const totalD   = correctD + wrongD;
    const accuracy = totalD > 0 ? ((correctD / totalD) * 100).toFixed(1) : '–';

    const kpis = [
      { label: 'Unique Players', value: playerIds.size },
      { label: 'Total Sessions', value: total },
      { label: 'Win Rate', value: `${winRate}%` },
      { label: 'Color Accuracy', value: `${accuracy}%` },
      { label: 'Rescue Rate', value: `${rescueRate}%` },
    ];

    const kpiRow = document.getElementById('kpi-row');
    for (const k of kpis) {
      kpiRow.innerHTML += `
        <div class="stat">
          <div class="stat-label">${k.label}</div>
          <div class="stat-value">${k.value}</div>
        </div>`;
    }

    document.getElementById('meta').textContent =
      `Last refreshed: ${new Date().toLocaleString()} · ${sessionList.length} total sessions`;

    // ── Per-level aggregation ─────────────────────────────────────────────────

    // Group sessions by level
    const byLevel = {};
    for (const s of sessionList) {
      const lvl = s.levelId ?? s.level ?? 'unknown';
      if (!byLevel[lvl]) byLevel[lvl] = { wins: 0, losses: 0, deploys: [], combos: [] };
      if (s.outcome === 'win')  byLevel[lvl].wins++;
      if (s.outcome === 'loss') byLevel[lvl].losses++;
      if (s.deploys   != null)  byLevel[lvl].deploys.push(s.deploys);
      if (s.maxCombo  != null)  byLevel[lvl].combos.push(s.maxCombo);
    }

    const levels = Object.keys(byLevel)
      .filter(l => l !== 'unknown')
      .sort((a, b) => Number(a) - Number(b));

    const winRates    = levels.map(l => {
      const d = byLevel[l];
      const t = d.wins + d.losses;
      return t > 0 ? +((d.wins / t) * 100).toFixed(1) : 0;
    });
    const failCounts  = levels.map(l => byLevel[l].losses);
    const avgDeploys  = levels.map(l => {
      const arr = byLevel[l].deploys;
      return arr.length > 0 ? +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : 0;
    });
    const avgCombos   = levels.map(l => {
      const arr = byLevel[l].combos;
      return arr.length > 0 ? +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : 0;
    });

    // ── Chart 1: Win rate per level ──────────────────────────────────────────
    addCard('Win Rate per Level (%)', 'chart-winrate', true);
    makeBarChart('chart-winrate', levels,
      [{ label: 'Win Rate %', data: winRates, backgroundColor: '#64ffda99', borderColor: '#64ffda', borderWidth: 1 }],
      { y: { min: 0, max: 100 } });

    // ── Chart 2: Most failed levels ──────────────────────────────────────────
    const failSorted = levels
      .map((l, i) => ({ level: l, fails: failCounts[i] }))
      .sort((a, b) => b.fails - a.fails)
      .slice(0, 15);

    const failMax = failSorted[0]?.fails || 1;
    const tableHtml = `
      <table>
        <thead><tr><th>#</th><th>Level</th><th>Fails</th><th></th></tr></thead>
        <tbody>
          ${failSorted.map((row, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>Level ${row.level}</td>
              <td>${row.fails}</td>
              <td><span class="fail-bar" style="width:${Math.round((row.fails / failMax) * 120)}px"></span></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
    addTableCard('Most Failed Levels', tableHtml);

    // ── Chart 3: Avg deploys per level ───────────────────────────────────────
    addCard('Avg Deploys per Level', 'chart-deploys');
    makeBarChart('chart-deploys', levels,
      [{ label: 'Avg Deploys', data: avgDeploys, backgroundColor: '#378add99', borderColor: '#378add', borderWidth: 1 }]);

    // ── Chart 4: Color accuracy ───────────────────────────────────────────────
    addCard('Color Accuracy (all sessions)', 'chart-accuracy');
    makeDoughnutChart('chart-accuracy',
      ['Correct', 'Wrong'],
      [correctD, wrongD]);

    // ── Chart 5: Avg combo per level ─────────────────────────────────────────
    addCard('Avg Max Combo per Level', 'chart-combo');
    makeBarChart('chart-combo', levels,
      [{ label: 'Avg Max Combo', data: avgCombos, backgroundColor: '#ef9f2799', borderColor: '#ef9f27', borderWidth: 1 }]);

    // ── Chart 6: Rescue usage ─────────────────────────────────────────────────
    addCard('Rescue Usage', 'chart-rescue');
    makeDoughnutChart('chart-rescue',
      ['Used Rescue', 'No Rescue'],
      [rescueUsed, total - rescueUsed]);

    // ── Chart 7: Sessions per day ─────────────────────────────────────────────
    const dayMap = {};
    for (const s of sessionList) {
      const ts = s.startedAt ?? s.timestamp ?? s.createdAt;
      if (!ts) continue;
      const day = new Date(typeof ts === 'number' ? ts : Date.parse(ts))
        .toISOString().slice(0, 10);
      dayMap[day] = (dayMap[day] || 0) + 1;
    }
    const days     = Object.keys(dayMap).sort();
    const dayCounts = days.map(d => dayMap[d]);

    addCard('Sessions per Day', 'chart-timeline', true);
    makeLineChart('chart-timeline', days,
      [{
        label: 'Sessions',
        data: dayCounts,
        borderColor: '#7f77dd',
        backgroundColor: '#7f77dd22',
        fill: true,
        tension: 0.3,
        pointRadius: 3,
      }]);

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.textContent = `Error loading data: ${err.message}`;
    document.getElementById('meta').textContent = '';
    console.error(err);
  }
}

main();
</script>
</body>
</html>
