name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Unit + audit tests gate the deploy — a red suite never ships.
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx vitest run

  # Visual smoke (Playwright, ~4-8 min). Blocking: root-caused the standing
  # timeout as SwiftShader software-WebGL wall-clock cost (not a real
  # regression) and fixed it at the CI timeout budget — proven stable across
  # two full green runs (a push + an unattended nightly sweep).
  visual-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: npx playwright test tests-visual/smoke

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-failures
          path: tests-visual/failures/
          retention-days: 7

  deploy:
    needs: [test, visual-smoke]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: /lane-defense/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
